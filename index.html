<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ColorCompra - Tu Coach de Color con IA</title>
    <meta name="description" content="Descubre tu paleta de colores ideal con nuestra IA. Recomendaciones personalizadas de maquillaje y labiales basadas en tu tono de piel y subtono." />
    <meta name="keywords" content="colorimetría, maquillaje, labiales, rubores, inteligencia artificial, coach de color" />
    <meta name="google-adsense-account" content="ca-pub-2292478582874425">
    
    <!-- Preconnect for Performance -->
    <link rel="preconnect" href="https://pagead2.googlesyndication.com">
    <link rel="dns-prefetch" href="https://pagead2.googlesyndication.com">

    <!-- Critical Assets Priority -->
    <link rel="preload" href="/src/main.tsx" as="script" fetchpriority="high">

    <!-- Optimized AdSense Loading (Delayed for Performance) -->
    <script>
      window.addEventListener('scroll', function() {
        if (!window.adsenseLoaded) {
          const script = document.createElement('script');
          script.async = true;
          script.src = "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2292478582874425";
          script.crossOrigin = "anonymous";
          document.head.appendChild(script);
          window.adsenseLoaded = true;
        }
      }, { once: true });
      
      // Also load on first touch/mouse move for non-scrolling users
      ['mousemove', 'touchstart'].forEach(event => {
        window.addEventListener(event, function() {
          if (!window.adsenseLoaded) {
            const script = document.createElement('script');
            script.async = true;
            script.src = "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2292478582874425";
            script.crossOrigin = "anonymous";
            document.head.appendChild(script);
            window.adsenseLoaded = true;
          }
        }, { once: true });
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
